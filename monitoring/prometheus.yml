global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ticket-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ticket-service:8081']

  - job_name: 'orchestrator-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orchestrator-service:8082']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8083']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
